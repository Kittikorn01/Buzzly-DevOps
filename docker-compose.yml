services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_OPTIONS=--max-old-space-size=3072
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    restart: always
    env_file:
      - ./mock-api/.env
